name: CI/CD Pipline build

on:
  push:
    branches:
      - main


jobs:
  build-on-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3 

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/laptop-app:latest .  
          docker push ${{secrets.DOCKER_USERNAME}}/laptop-app:latest

      - name: Deploy on EC2 instance server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }} 
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{secrets.DOCKER_USERNAME}}/laptop-app:latest
            docker stop laptop-price || true
            docker rm laptop-price || true
            docker run -d -p 8005:8005 --name laptop-price ${{secrets.DOCKER_USERNAME}}/laptop-app:latest   
       
