name: CI/CD Pipline build

on:
  push:
    branchs:
      - main


jobs:
  build-on-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6 

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Image
        runs: |
          docker build -t ${{secrets.DOCKERHUB_USERNAME}}/laptop-app:latest .  
          docker push ${{secrets.DOCKERHUB_USERNAME}}/laptop-app:latest

      - name: Deploy on EC2 instance server
        users: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }} 
          username: ubuntu-latest
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{secrets.DOCKERHUB_USERNAME}}/laptop-app:latest
            docker stop latop-price || true
            docker rm laptop-price || true
            docker run -d -p 8005:8005 --name laptop-price ${{secrets.DOCKERHUB_USERNAME}}/laptop-app:latest   
       